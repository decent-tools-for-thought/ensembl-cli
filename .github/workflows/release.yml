name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish. Defaults to v<project version>.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve release tag
        id: release_meta
        run: |
          version="$(python -c 'from pathlib import Path; import tomllib; print(tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"
          tag="${{ github.event.inputs.release_tag }}"
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          elif [ -z "$tag" ]; then
            tag="v${version}"
          fi
          test "$tag" = "v${version}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Build release archive
        run: ./scripts/build-release-archive.sh dist

      - name: Build and verify Python distributions
        run: bash scripts/verify_python_dist.sh

      - name: Upload verified release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build-and-verify

    steps:
      - name: Download verified release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build-and-verify.outputs.release_tag }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" \
              dist/ensembl-cli-*.tar.gz \
              dist/ensembl_cli-*.tar.gz \
              dist/ensembl_cli-*.whl \
              dist/SHA256SUMS \
              --clobber \
              --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${RELEASE_TAG}" \
              dist/ensembl-cli-*.tar.gz \
              dist/ensembl_cli-*.tar.gz \
              dist/ensembl_cli-*.whl \
              dist/SHA256SUMS \
              --target "${GITHUB_SHA}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi

name: Release Drift

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

jobs:
  rebuild-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Build and verify wheel and sdist
        run: bash scripts/verify_python_dist.sh
